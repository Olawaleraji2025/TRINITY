<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap&text=searchpersonshopping_cartmenuclose"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <title>Trinity Supermarket - Cosmetics</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shop.css" />
    <link rel="stylesheet" href="cosmetics.css" />
  </head>
  <body id="Up" class="">
    <!-- Loader -->
    <div id="loader" class="loader">
      <div class="loader-image">
        <img src="Homepage/Femforth-2.png" alt="" />
      </div>
    </div>

    <header class="header-nav-bar">
      <nav class="container nav-container">
        <div class="image-container">
          <a href="index.html" class="logo-link">
            <img src="Homepage/femforth-1.png" alt="" class="logo-img" />
          </a>
        </div>
        <div class="nav-links">
          <div class="search-container">
            <span class="hidden-search material-symbols-outlined">search</span>
            <input
              type="search"
              placeholder="Search for Products"
              class="search-inputs2"
            />
          </div>
          <div class="hidden-results-container2" id="hiddenContainer"></div>
        </div>
        <div class="nav-section">
          <div class="nav-icons">
            <div class="search-container-icon">
              <span class="search-icon material-symbols-outlined">search</span>
            </div>
            <div class="whishlist-icon">
              <a href="wishlist.html" class="whishlist whishlist-text"
                ><span class="material-symbols-outlined"> favorite </span>
                <span>Wishlist</span>
              </a>
            </div>
            <div class="cart-container">
              <a href="cart.html" class="cart"
                ><span class="material-symbols-outlined">shopping_cart</span
                ><span id="cart-count" class="cart-count">0</span>
              </a>
              <span class="cart-text">Cart</span>
            </div>
            <div class="menu-close-icon">
              <span class="menu material-symbols-outlined">menu</span>
              <span class="hidden-close material-symbols-outlined">close</span>
            </div>
            <div class="mobile-menu">
              <ul>
                <li><a href="wishlist.html">Wishlist</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <div class="modal-search">
        <div class="close-container">
          <span class="close-menu material-symbols-outlined">close</span>
        </div>
        <div class="search-message">
          <p>What are you searching for?</p>
        </div>
        <div class="search-container">
          <span class="hidden-search material-symbols-outlined">search</span>
          <input
            type="search"
            placeholder="Search for Products"
            class="search-inputs"
          />
        </div>
        <div class="hidden-results-container" id="hiddenContainer2"></div>
      </div>
    </header>

    <section class="breadcrumb-section">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span><i class="material-symbols-outlined">chevron_right</i></span>
        <span>Cosmetics</span>
      </div>
    </section>

    <section>
      <div class="shop-header-container">
        <div class="results-display">
          <p class="results-display-text"></p>
        </div>

        <div class="sort-container">
          <select id="sort-select" class="sort">
            <option value="default">Sort by: Default</option>
            <option value="price-low-high">Price: Low to High</option>
            <option value="price-high-low">Price: High to Low</option>
            <option value="name-a-z">Name: A to Z</option>
            <option value="name-z-a">Name: Z to A</option>
          </select>
        </div>
      </div>
    </section>

    <section class="all-products">
      <div class="all-products-container" id="allProductsContainer">
        <!-- Products will be dynamically inserted here -->
      </div>
    </section>

    <script src="cosmetics.js"></script>
  </body>
</html>
